name: Generate Snake Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@main
        with:
          github_user_name: parth2804
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake.dark.svg?palette=github-dark

      - name: Create output directory
        run: mkdir -p output

      - name: Copy snake files
        run: |
          cp dist/github-contribution-grid-snake.svg output/snake.svg
          cp dist/github-contribution-grid-snake.dark.svg output/snake-dark.svg

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/snake.svg output/snake-dark.svg
          git commit -m "🐍 Generate snake animation" || echo "No changes to commit"
          git push
